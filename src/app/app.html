<div class="app-wrapper">
  <!-- Top Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">
        <span class="logo-icon">🏥</span>
        <div>
          <h1>BedTracker India</h1>
          <span class="tagline">Real-time Hospital Bed Availability</span>
        </div>
      </div>
    </div>
    <div class="nav-right">
      <div class="live-indicator">
        <span class="live-dot"></span>
        <span>LIVE</span>
      </div>
      <mat-form-field appearance="outline" class="city-select">
        <mat-label>Select City</mat-label>
        <mat-select [(value)]="selectedCity" (selectionChange)="onCityChange($event)">
          <mat-option value="Delhi">Delhi</mat-option>
          <mat-option value="Mumbai">Mumbai</mat-option>
          <mat-option value="Bangalore">Bangalore</mat-option>
          <mat-option value="Chennai">Chennai</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </nav>

  <!-- Alert Banner -->
  <app-alert-banner [alerts]="criticalAlerts"></app-alert-banner>

  <!-- Main Content -->
  <main class="main-content">
    <app-dashboard
      [cityData]="cityData"
      [isLoading]="isLoading"
      [lastUpdated]="lastUpdated">
    </app-dashboard>
  </main>
</div>

<router-outlet></router-outlet>
