version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: hbt_postgres
    environment:
      POSTGRES_DB: hospital_bed_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hbt_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: HospitalBedTracker/Dockerfile
    container_name: hbt_api
    ports:
      - "5259:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=hospital_bed_tracker;Username=postgres;Password=admin123
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: